version: "3.8"

# vLLM serve for Qwen3.5-122B-A10B-NVFP4 on Jetson AGX Thor
#
# Usage:
#   docker compose up
#
# Prerequisites:
#   - Model weights at ~/Qwen3.5-122B-A10B-NVFP4/resharded/
#   - Docker image built: vllm-thor:qwen35-latest
#   - nvidia container runtime installed

services:
  vllm:
    image: vllm-thor:qwen35-latest
    container_name: vllm-qwen35
    runtime: nvidia
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - LD_PRELOAD=/usr/lib/aarch64-linux-gnu/nvidia/libcuda.so.1
      - HF_HUB_DISABLE_XET=1
      - VLLM_USE_FLASHINFER_MOE_FP4=0
    volumes:
      # Model weights (read-only)
      - "${HOME}/Qwen3.5-122B-A10B-NVFP4/resharded:/model:ro"
      # CUDA graph cache — persist to avoid re-capturing on every start
      # First start will take 10-20 min to capture graphs; subsequent starts are fast
      - "${HOME}/thor-vllm-cache:/root/.cache/vllm"
    command: >
      vllm serve /model
        --host 0.0.0.0
        --port 8000
        --max-model-len 16384
        --max-num-seqs 2
        --max-num-batched-tokens 8192
        --gpu-memory-utilization 0.72
        --trust-remote-code
        --quantization compressed-tensors
        --attention-backend FLASHINFER
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_coder
    # DO NOT add --enforce-eager — causes ~120s TTFT on even short prompts
    # DO NOT increase --gpu-memory-utilization above 0.72 — causes OOM at load
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s  # 20 min — allow for CUDA graph capture on first boot